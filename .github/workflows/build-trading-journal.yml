name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: trogers1052/trading-testkit
          ref: v0.1.0
          path: ../trading-testkit
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - run: go vet ./...

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: trogers1052/trading-testkit
          ref: v0.1.0
          path: ../trading-testkit
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - run: go test -v -race -short -cover ./...

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: trogers1052/trading-testkit
          ref: v0.1.0
          path: ../trading-testkit
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - name: Run integration tests
        run: go test -v -race -run 'Integration' -timeout 300s ./...

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint, unit-test, integration-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: trogers1052/trading-testkit
          ref: v0.1.0
          path: ../trading-testkit
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - name: Build Linux ARM64 binary
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/trading-journal ./cmd/journal
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/trogers1052/trading-journal:latest
            ghcr.io/trogers1052/trading-journal:${{ github.sha }}
